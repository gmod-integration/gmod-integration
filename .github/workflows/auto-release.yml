name: Auto Release

on:
    push:
        branches: [main, master]
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            version_type:
                description: 'Version bump type'
                required: true
                default: 'patch'
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: auto-release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    version:
        name: Resolve Version & Tag
        runs-on: ubuntu-latest
        outputs:
            new_version: ${{ steps.resolve.outputs.new_version }}
            new_tag: ${{ steps.resolve.outputs.new_tag }}
            latest_tag: ${{ steps.resolve.outputs.latest_tag }}
            version_type: ${{ steps.resolve.outputs.version_type }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Resolve release state
              id: resolve
              shell: bash
              run: |
                  set -euo pipefail

                  git fetch origin --tags "+refs/heads/*:refs/remotes/origin/*"

                  SOURCE_SHA="${{ github.sha }}"
                  VERSION_TYPE="${{ github.event.inputs.version_type || 'patch' }}"
                  RELEASE_COMMIT=""
                  NEW_VERSION=""
                  NEW_TAG=""
                  NEEDS_VERSION_COMMIT="false"
                  TAG_EXISTS="false"

                  version_from_commit() {
                      git show "$1:lua/autorun/gmod_integration.lua" |
                          sed -n 's/.*gmInte\.version = "\([0-9][0-9.]*\)".*/\1/p'
                  }

                  # A tag-triggered run is already versioned by definition.
                  if [[ "${{ github.ref_type }}" == "tag" ]]; then
                      NEW_TAG="${{ github.ref_name }}"
                      if [[ ! "$NEW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                          echo "Unsupported release tag: $NEW_TAG" >&2
                          exit 1
                      fi
                      RELEASE_COMMIT=$(git rev-list -n 1 "$NEW_TAG")
                      NEW_VERSION="${NEW_TAG#v}"
                      TAG_EXISTS="true"
                  fi

                  # The old workflow pushed the tag before the release commit.
                  # Recover a tagged child of the triggering commit even when
                  # the subsequent branch push failed.
                  if [[ -z "$RELEASE_COMMIT" ]]; then
                      while IFS= read -r CANDIDATE_TAG; do
                          CANDIDATE_COMMIT=$(git rev-list -n 1 "$CANDIDATE_TAG")
                          CANDIDATE_PARENT=$(git rev-parse "$CANDIDATE_COMMIT^" 2>/dev/null || true)
                          CANDIDATE_SUBJECT=$(git show -s --format=%s "$CANDIDATE_COMMIT")

                          if [[ "$CANDIDATE_COMMIT" == "$SOURCE_SHA" ]] || \
                             { [[ "$CANDIDATE_PARENT" == "$SOURCE_SHA" ]] && [[ "$CANDIDATE_SUBJECT" == "chore: bump version to "* ]]; }; then
                              RELEASE_COMMIT="$CANDIDATE_COMMIT"
                              NEW_TAG="$CANDIDATE_TAG"
                              NEW_VERSION="${NEW_TAG#v}"
                              TAG_EXISTS="true"
                              break
                          fi
                      done < <(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname)
                  fi

                  # A previous attempt may have pushed its version commit before
                  # failing to create the tag or before a downstream publish job.
                  if [[ -z "$RELEASE_COMMIT" ]]; then
                      SOURCE_SUBJECT=$(git show -s --format=%s "$SOURCE_SHA")
                      if [[ "$SOURCE_SUBJECT" == "chore: bump version to "* ]]; then
                          RELEASE_COMMIT="$SOURCE_SHA"
                      else
                          BRANCH_REF="refs/remotes/origin/${{ github.ref_name }}"
                          if git show-ref --verify --quiet "$BRANCH_REF"; then
                              CANDIDATE=$(git rev-list --ancestry-path --reverse "$SOURCE_SHA..$BRANCH_REF" | head -n 1 || true)
                              if [[ -n "$CANDIDATE" ]] && [[ "$(git rev-parse "$CANDIDATE^")" == "$SOURCE_SHA" ]]; then
                                  CANDIDATE_SUBJECT=$(git show -s --format=%s "$CANDIDATE")
                                  if [[ "$CANDIDATE_SUBJECT" == "chore: bump version to "* ]]; then
                                      RELEASE_COMMIT="$CANDIDATE"
                                  fi
                              fi
                          fi
                      fi

                      if [[ -n "$RELEASE_COMMIT" ]]; then
                          NEW_VERSION=$(version_from_commit "$RELEASE_COMMIT")
                          NEW_TAG="v$NEW_VERSION"

                          if git rev-parse -q --verify "refs/tags/$NEW_TAG" >/dev/null; then
                              TAG_COMMIT=$(git rev-list -n 1 "$NEW_TAG")
                              if [[ "$TAG_COMMIT" != "$RELEASE_COMMIT" ]]; then
                                  echo "Tag $NEW_TAG points to $TAG_COMMIT instead of $RELEASE_COMMIT" >&2
                                  exit 1
                              fi
                              TAG_EXISTS="true"
                          fi
                      fi
                  fi

                  if [[ -z "$RELEASE_COMMIT" ]]; then
                      LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | sed -n '1p')
                      LATEST_TAG=${LATEST_TAG:-v0.0.0}

                      VERSION=${LATEST_TAG#v}
                      IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
                      MAJOR=${MAJOR:-0}
                      MINOR=${MINOR:-0}
                      PATCH=${PATCH:-0}

                      case "$VERSION_TYPE" in
                          major)
                              MAJOR=$((MAJOR + 1))
                              MINOR=0
                              PATCH=0
                              ;;
                          minor)
                              MINOR=$((MINOR + 1))
                              PATCH=0
                              ;;
                          patch)
                              PATCH=$((PATCH + 1))
                              ;;
                          *)
                              echo "Unsupported version type: $VERSION_TYPE" >&2
                              exit 1
                              ;;
                      esac

                      NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                      NEW_TAG="v$NEW_VERSION"
                      NEEDS_VERSION_COMMIT="true"
                  fi

                  if [[ -z "$NEW_VERSION" ]] || [[ ! "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "Could not resolve a valid release version" >&2
                      exit 1
                  fi

                  LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Fxv "$NEW_TAG" | head -n 1 || true)
                  LATEST_TAG=${LATEST_TAG:-v0.0.0}

                  PREVIOUS_VERSION=${LATEST_TAG#v}
                  IFS='.' read -r PREVIOUS_MAJOR PREVIOUS_MINOR _ <<< "$PREVIOUS_VERSION"
                  IFS='.' read -r NEW_MAJOR NEW_MINOR _ <<< "$NEW_VERSION"
                  if (( NEW_MAJOR > ${PREVIOUS_MAJOR:-0} )); then
                      VERSION_TYPE="major"
                  elif (( NEW_MINOR > ${PREVIOUS_MINOR:-0} )); then
                      VERSION_TYPE="minor"
                  else
                      VERSION_TYPE="patch"
                  fi

                  echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                  echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
                  echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
                  echo "version_type=$VERSION_TYPE" >> "$GITHUB_OUTPUT"
                  echo "release_commit=$RELEASE_COMMIT" >> "$GITHUB_OUTPUT"
                  echo "needs_version_commit=$NEEDS_VERSION_COMMIT" >> "$GITHUB_OUTPUT"
                  echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

                  echo "Release: $NEW_TAG"
                  echo "Previous release: $LATEST_TAG"
                  echo "Existing release commit: ${RELEASE_COMMIT:-none}"
                  echo "Tag already exists: $TAG_EXISTS"

            - name: Create or reuse version commit and tag
              shell: bash
              run: |
                  set -euo pipefail

                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"

                  NEW_VERSION="${{ steps.resolve.outputs.new_version }}"
                  NEW_TAG="${{ steps.resolve.outputs.new_tag }}"
                  RELEASE_COMMIT="${{ steps.resolve.outputs.release_commit }}"

                  if [[ "${{ steps.resolve.outputs.needs_version_commit }}" == "true" ]]; then
                      sed -i "s/gmInte\.version = \"[^\"]*\"/gmInte.version = \"$NEW_VERSION\"/g" lua/autorun/gmod_integration.lua
                      grep -m 1 '^gmInte.version' lua/autorun/gmod_integration.lua

                      git add lua/autorun/gmod_integration.lua
                      if git diff --cached --quiet; then
                          # A previous partial attempt may already have written
                          # the target version without leaving a detectable bump
                          # commit. Reuse HEAD instead of failing with exit code 1.
                          CURRENT_VERSION=$(sed -n 's/.*gmInte\.version = "\([0-9][0-9.]*\)".*/\1/p' lua/autorun/gmod_integration.lua)
                          if [[ "$CURRENT_VERSION" != "$NEW_VERSION" ]]; then
                              echo "Version file is $CURRENT_VERSION, expected $NEW_VERSION" >&2
                              exit 1
                          fi
                          RELEASE_COMMIT=$(git rev-parse HEAD)
                          echo "Version $NEW_VERSION is already present; reusing commit $RELEASE_COMMIT"
                      else
                          git commit -m "chore: bump version to $NEW_VERSION" -m "Release-Source: ${{ github.sha }}"
                          RELEASE_COMMIT=$(git rev-parse HEAD)
                      fi
                  fi

                  # Push the release commit before its tag. This also repairs a
                  # previous tag-only attempt without rewriting branch history.
                  if [[ "${{ github.ref_type }}" != "tag" ]]; then
                      BRANCH_REF="refs/remotes/origin/${{ github.ref_name }}"
                      if ! git merge-base --is-ancestor "$RELEASE_COMMIT" "$BRANCH_REF"; then
                          git push origin "$RELEASE_COMMIT:refs/heads/${{ github.ref_name }}"
                      else
                          echo "Release commit is already present on ${{ github.ref_name }}"
                      fi
                  fi

                  if [[ "${{ steps.resolve.outputs.tag_exists }}" != "true" ]]; then
                      git tag "$NEW_TAG" "$RELEASE_COMMIT"
                      git push origin "refs/tags/$NEW_TAG"
                  else
                      echo "Reusing existing tag $NEW_TAG"
                  fi

    changelog:
        name: Generate Changelog
        runs-on: ubuntu-latest
        needs: version
        outputs:
            changelog: ${{ steps.changelog.outputs.changelog }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ needs.version.outputs.new_tag }}

            - name: Generate changelog
              id: changelog
              run: |
                  LATEST_TAG="${{ needs.version.outputs.latest_tag }}"
                  NEW_TAG="${{ needs.version.outputs.new_tag }}"

                  echo "## What's Changed" > CHANGELOG.md
                  echo "" >> CHANGELOG.md

                  if [ "$LATEST_TAG" != "v0.0.0" ]; then
                    git log --pretty=format:"* %s (%h)" $LATEST_TAG..HEAD >> CHANGELOG.md
                  else
                    git log --pretty=format:"* %s (%h)" >> CHANGELOG.md
                  fi

                  echo "" >> CHANGELOG.md
                  echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$LATEST_TAG...$NEW_TAG" >> CHANGELOG.md

                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  cat CHANGELOG.md >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

    build:
        name: Build Release Archive
        runs-on: ubuntu-latest
        needs: version
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.version.outputs.new_tag }}

            - name: Create full release archive
              run: |
                  mkdir -p gmod-integration-release/addons/gmod-integration
                  cp -r lua/ gmod-integration-release/addons/gmod-integration/
                  [ -f LICENSE ] && cp LICENSE gmod-integration-release/addons/gmod-integration/

                  # Copy README.md to both addon folder and root of zip
                  [ -f README.md ] && cp README.md gmod-integration-release/addons/gmod-integration/
                  [ -f README.md ] && cp README.md gmod-integration-release/

                  cd gmod-integration-release
                  zip -r ../gmod-integration-${{ needs.version.outputs.new_version }}.zip .
                  cd ..

            - name: Create README-only archive for gmodstore and aide-serveurs
              run: |
                  mkdir -p gmod-integration-readme
                  [ -f README.md ] && cp README.md gmod-integration-readme/

                  cd gmod-integration-readme
                  zip -r ../gmod-integration-readme-${{ needs.version.outputs.new_version }}.zip .
                  cd ..

            - name: Upload full archive artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-archive
                  path: gmod-integration-${{ needs.version.outputs.new_version }}.zip
                  overwrite: true

            - name: Upload README-only archive artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-archive-readme
                  path: gmod-integration-readme-${{ needs.version.outputs.new_version }}.zip
                  overwrite: true

    github-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [version, changelog, build]
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-archive

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ needs.version.outputs.new_tag }}
                  name: ${{ needs.version.outputs.new_tag }}
                  body: ${{ needs.changelog.outputs.changelog }}
                  files: |
                      gmod-integration-${{ needs.version.outputs.new_version }}.zip
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    gmodstore-release:
        name: Publish to GMod Store
        runs-on: ubuntu-latest
        needs: [version, changelog, build, github-release, publish_workshop]
        if: needs.version.outputs.version_type != 'patch'
        steps:
            - name: Download README-only artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-archive-readme

            - name: Publish to GMod Store
              run: |
                  NEW_VERSION="${{ needs.version.outputs.new_version }}"
                  CHANGELOG="${{ needs.changelog.outputs.changelog }}"

                  # Prepare changelog for API
                  API_CHANGELOG=$(echo "$CHANGELOG" | sed 's/## What'\''s Changed/What'\''s Changed:/g' | sed 's/\*\*Full Changelog\*\*/Full Changelog:/g' | head -c 9000)

                  # Upload to GMod Store
                  curl -X POST "https://api.pivity.com/v3/products/${{ secrets.GMODSTORE_PRODUCT_ID }}/versions" \
                    -H "Authorization: Bearer ${{ secrets.GMODSTORE_API_TOKEN }}" \
                    -F "name=v$NEW_VERSION" \
                    -F "changelog=$API_CHANGELOG" \
                    -F "file=@gmod-integration-readme-$NEW_VERSION.zip" \
                    -F "releaseType=stable" \
                    --fail-with-body || echo "Failed to publish to GMod Store - check your API token and product ID"
              env:
                  GMODSTORE_API_TOKEN: ${{ secrets.GMODSTORE_API_TOKEN }}
                  GMODSTORE_PRODUCT_ID: ${{ secrets.GMODSTORE_PRODUCT_ID }}

    publish_workshop:
        name: Publish to Steam Workshop
        runs-on: ubuntu-latest
        needs: [build, version, changelog, github-release]

        steps:
            - name: Checkout gmod-integration
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.version.outputs.new_tag }}

            - name: Prepare workshop folder
              run: |
                  mkdir -p workshop
                  cp -r lua/ workshop/
                  cp -r materials/ workshop/
                  cp addon.json workshop/

            - name: Publish to Workshop
              uses: linventif/gmod-workshop-cicd@2.0.0
              with:
                  steam_user: ${{ secrets.STEAM_USER }}
                  steam_pass: ${{ secrets.STEAM_PASS }}
                  steam_shared_secret: ${{ secrets.STEAM_SHARED_SECRET }}
                  published_file_id: ${{ secrets.GMOD_INTEGRATION_PUBLISHED_FILE_ID }}
                  content_path: /github/workspace/workshop
                  preview_file: /github/workspace/workshop/materials/gmod_integration/logo.png
                  title: Gmod Integration v${{ needs.version.outputs.new_version }}
                  description: Workshop Content of gmod-integration.com – all information on the website.
                  visibility: "0"
                  change_note: ${{ needs.changelog.outputs.changelog }}

    aide-serveurs:
        name: Publish to aide-serveur.fr
        runs-on: ubuntu-latest
        needs: [version, changelog, github-release, build, publish_workshop]
        steps:
            - name: Download README-only artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-archive-readme

            - name: Checkout helper CLI
              run: git clone https://github.com/linventif/aide-serveur-cicd.git aide-serveur-cicd

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1

            - name: Install CLI dependencies
              working-directory: aide-serveur-cicd
              run: bun install

            - name: Prepare README-only archive for upload
              run: |
                  mv gmod-integration-readme-${{ needs.version.outputs.new_version }}.zip gmod-integration-${{ needs.version.outputs.new_version }}.zip

            - name: Publish update via aide-serveur-cicd
              working-directory: aide-serveur-cicd
              env:
                  EMAIL: ${{ secrets.AIDE_SERVEUR_EMAIL }}
                  PASSWORD: ${{ secrets.AIDE_SERVEUR_PASSWORD }}
                  RESOURCE: ${{ secrets.AIDE_SERVEUR_RESOURCE }}
                  UPDATE_VERSION: ${{ needs.version.outputs.new_tag }}
                  UPDATE_MSG: '${{ needs.changelog.outputs.changelog }}'
              run: bun src/index.ts
